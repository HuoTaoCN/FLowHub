name: Release

# 推送 v* 格式的 tag 时触发，例如 git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FlowHub ${{ github.ref_name }}"
          releaseBody: |
            ## FlowHub ${{ github.ref_name }}

            | 平台 | 下载文件 |
            |------|---------|
            | macOS (Apple Silicon + Intel) | `FlowHub_*.dmg` |
            | Windows | `FlowHub_*_x64-setup.exe` |
            | Linux | `flow-hub_*_amd64.AppImage` / `.deb` |

            **macOS**：下载 `.dmg`，拖入 Applications 即可
            **Windows**：运行 `.exe` 安装程序
            **Linux**：`.AppImage` 直接运行，`.deb` 适合 Debian/Ubuntu
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: "app"
