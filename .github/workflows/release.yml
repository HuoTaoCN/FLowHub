name: Release

# 推送 v* 格式的 tag 时触发，例如 git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            cargo_args: --target universal-apple-darwin
            bundle_ext: dmg
            bundle_dir: macos

          - platform: ubuntu-22.04
            target: ""
            rust_targets: ""
            cargo_args: ""
            bundle_ext: AppImage
            bundle_dir: linux

          - platform: windows-latest
            target: ""
            rust_targets: ""
            cargo_args: ""
            bundle_ext: exe
            bundle_dir: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Tauri app (macOS universal)
        if: matrix.platform == 'macos-latest'
        working-directory: app
        run: npx tauri build --target universal-apple-darwin

      - name: Build Tauri app (Linux / Windows)
        if: matrix.platform != 'macos-latest'
        working-directory: app
        run: npx tauri build

      - name: Upload release artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload release artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload release artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
