name: Release

# 推送 v* 格式的 tag 时触发，例如 git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            cargo_args: --target universal-apple-darwin
            bundle_ext: dmg
            bundle_dir: macos

          - platform: ubuntu-22.04
            target: ""
            rust_targets: ""
            cargo_args: ""
            bundle_ext: AppImage
            bundle_dir: linux

          - platform: windows-latest
            target: ""
            rust_targets: ""
            cargo_args: ""
            bundle_ext: exe
            bundle_dir: windows

    runs-on: ${{ matrix.platform }}

    env:
      RELEASE_BODY: |
        ## FlowHub ${{ github.ref_name }}

        局域网文件流转工具。下载对应平台安装包：

        | 平台 | 文件 |
        |------|------|
        | macOS (Apple Silicon + Intel) | `FlowHub_*.dmg` |
        | Windows | `FlowHub_*-setup.exe` 或 `.msi` |
        | Linux | `flow-hub_*.AppImage` 或 `.deb` |

        ### 安装说明（当前为未签名版本）
        - **macOS**：下载 `.dmg` 拖入「应用程序」。首次打开若提示「已损坏/无法验证开发者」，请用「右键 → 打开」，或在终端执行 `xattr -cr /Applications/FlowHub.app` 后再打开。
        - **Windows**：运行 `.exe`，若出现 SmartScreen 提示点「更多信息 → 仍要运行」。
        - **Linux**：`.AppImage` 加可执行权限后直接运行；`.deb` 适用于 Debian/Ubuntu。

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app (macOS universal)
        if: matrix.platform == 'macos-latest'
        working-directory: app
        run: npx tauri build --target universal-apple-darwin

      - name: Build Tauri app (Linux / Windows)
        if: matrix.platform != 'macos-latest'
        working-directory: app
        run: npx tauri build

      - name: Upload release artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ env.RELEASE_BODY }}
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload release artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ env.RELEASE_BODY }}
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb

      - name: Upload release artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ env.RELEASE_BODY }}
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
